<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V1PER — Brand Launchpad</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #181818;
    --border: #2a2a2a;
    --accent: #c8ff00;
    --accent2: #ff3c3c;
    --text: #f0f0f0;
    --muted: #666;
    --font-display: 'Bebas Neue', cursive;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 40px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 2.4rem;
    letter-spacing: 0.12em;
    color: var(--text);
    line-height: 1;
  }

  .logo span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .progress-pill {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 100px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .progress-pill span { color: var(--accent); font-weight: 700; }

  .chat-toggle-btn {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    padding: 8px 18px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.05em;
    font-weight: 700;
    transition: opacity 0.2s;
  }

  .chat-toggle-btn:hover { opacity: 0.85; }

  .save-indicator {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--accent);
    letter-spacing: 0.05em;
    opacity: 0;
    transition: opacity 0.4s;
  }

  .save-indicator.show { opacity: 1; }

  /* HERO */
  .hero {
    padding: 64px 40px 48px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .hero::after {
    content: 'V1PER';
    font-family: var(--font-display);
    font-size: 22vw;
    position: absolute;
    right: -2vw;
    top: 50%;
    transform: translateY(-50%);
    color: transparent;
    -webkit-text-stroke: 1px rgba(200,255,0,0.06);
    pointer-events: none;
    letter-spacing: 0.05em;
    line-height: 1;
    white-space: nowrap;
  }

  .hero h1 {
    font-family: var(--font-display);
    font-size: clamp(2.5rem, 6vw, 5rem);
    letter-spacing: 0.08em;
    line-height: 1;
    color: var(--text);
    max-width: 600px;
    position: relative;
    z-index: 1;
  }

  .hero h1 em {
    font-style: normal;
    color: var(--accent);
  }

  .hero p {
    margin-top: 16px;
    font-size: 0.95rem;
    color: var(--muted);
    font-weight: 300;
    max-width: 420px;
    line-height: 1.6;
    position: relative;
    z-index: 1;
  }

  /* MAIN LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 1fr;
    padding: 40px;
    gap: 32px;
    max-width: 1400px;
    margin: 0 auto;
    transition: grid-template-columns 0.4s ease;
  }

  .layout.chat-open {
    grid-template-columns: 1fr 400px;
  }

  /* SECTIONS */
  .sections-grid {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .section-card:hover { border-color: #3a3a3a; }

  .section-card.completed { border-color: rgba(200,255,0,0.25); }

  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 24px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s, background 0.2s;
  }

  .section-card.expanded .section-header {
    border-bottom-color: var(--border);
    background: var(--surface2);
  }

  .section-num {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 3px;
    flex-shrink: 0;
    letter-spacing: 0.08em;
  }

  .section-card.completed .section-num {
    background: rgba(200,255,0,0.1);
    border-color: rgba(200,255,0,0.3);
    color: var(--accent);
  }

  .section-title {
    font-family: var(--font-display);
    font-size: 1.35rem;
    letter-spacing: 0.06em;
    flex: 1;
  }

  .section-meta {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .section-meta .done { color: var(--accent); }

  .chevron {
    width: 18px;
    height: 18px;
    color: var(--muted);
    transition: transform 0.3s ease;
    flex-shrink: 0;
  }

  .section-card.expanded .chevron { transform: rotate(180deg); }

  /* TASKS */
  .tasks-container {
    display: none;
    flex-direction: column;
    gap: 0;
  }

  .section-card.expanded .tasks-container { display: flex; }

  .task-item {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .task-item:last-child { border-bottom: none; }

  .task-item:hover { background: rgba(255,255,255,0.02); }

  .task-checkbox-area {
    padding: 18px 20px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 20px;
  }

  .task-cb {
    width: 20px;
    height: 20px;
    appearance: none;
    -webkit-appearance: none;
    border: 2px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    position: relative;
    transition: border-color 0.2s, background 0.2s;
    flex-shrink: 0;
  }

  .task-cb:checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .task-cb:checked::after {
    content: '';
    position: absolute;
    left: 4px;
    top: 1px;
    width: 6px;
    height: 10px;
    border: 2px solid #0a0a0a;
    border-top: none;
    border-left: none;
    transform: rotate(45deg);
  }

  .task-content {
    padding: 18px 24px 18px 0;
  }

  .task-title {
    font-size: 0.92rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    margin-bottom: 6px;
    transition: color 0.2s;
  }

  .task-item.done .task-title {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: rgba(200,255,0,0.4);
  }

  .task-desc {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.6;
    font-weight: 300;
    max-width: 680px;
  }

  .task-tag {
    display: inline-block;
    margin-top: 8px;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--accent);
    background: rgba(200,255,0,0.08);
    border: 1px solid rgba(200,255,0,0.2);
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 0.06em;
  }

  /* PROGRESS BAR */
  .overall-progress {
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .progress-label span:first-child {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .progress-label span:last-child {
    font-family: var(--font-display);
    font-size: 1.4rem;
    color: var(--accent);
    letter-spacing: 0.08em;
  }

  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.5s ease;
    width: 0%;
  }

  /* CHAT PANEL */
  .chat-panel {
    display: none;
    flex-direction: column;
    height: calc(100vh - 200px);
    position: sticky;
    top: 90px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .chat-panel.visible { display: flex; }

  .chat-header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .chat-dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .chat-header-text {
    flex: 1;
  }

  .chat-header-text h3 {
    font-family: var(--font-display);
    font-size: 1rem;
    letter-spacing: 0.08em;
    color: var(--text);
  }

  .chat-header-text p {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 1px;
  }

  .chat-close {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.2rem;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 3px;
    transition: color 0.2s, background 0.2s;
  }

  .chat-close:hover { color: var(--text); background: var(--border); }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: msgIn 0.3s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-label {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    letter-spacing: 0.06em;
    color: var(--muted);
  }

  .msg.user .msg-label { text-align: right; }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: 4px;
    font-size: 0.83rem;
    line-height: 1.6;
    max-width: 88%;
    font-weight: 300;
  }

  .msg.ai .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    align-self: flex-start;
  }

  .msg.user .msg-bubble {
    background: rgba(200,255,0,0.1);
    border: 1px solid rgba(200,255,0,0.25);
    color: var(--text);
    align-self: flex-end;
  }

  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    width: fit-content;
  }

  .typing-dot {
    width: 5px;
    height: 5px;
    background: var(--muted);
    border-radius: 50%;
    animation: typingBounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  .chat-input-area {
    padding: 16px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .chat-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.83rem;
    padding: 10px 14px;
    border-radius: 4px;
    outline: none;
    resize: none;
    min-height: 40px;
    max-height: 120px;
    line-height: 1.5;
    font-weight: 300;
    transition: border-color 0.2s;
  }

  .chat-input:focus { border-color: rgba(200,255,0,0.4); }
  .chat-input::placeholder { color: var(--muted); }

  .send-btn {
    background: var(--accent);
    border: none;
    color: #0a0a0a;
    width: 38px;
    height: 38px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }

  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .send-btn svg { width: 16px; height: 16px; }

  /* Responsive */
  @media (max-width: 900px) {
    .layout { padding: 20px; }
    .layout.chat-open { grid-template-columns: 1fr; }
    header { padding: 18px 20px; }
    .hero { padding: 40px 20px 32px; }
    .overall-progress { padding: 20px; }
    .chat-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60vh;
      top: auto;
      border-radius: 12px 12px 0 0;
      z-index: 200;
    }
  }
</style>
</head>
<body>

<header>
  <div class="logo">V<span>1</span>PER</div>
  <div class="header-right">
    <span class="save-indicator" id="saveIndicator">✓ SAVED</span>
    <div class="progress-pill">COMPLETE: <span id="headerProgress">0%</span></div>
    <button class="chat-toggle-btn" onclick="toggleChat()">⚡ AI ADVISOR</button>
  </div>
</header>

<div class="hero">
  <h1>BRAND<br><em>LAUNCHPAD</em></h1>
  <p>Your complete V1PER brand-building checklist. Check off each task as you execute. Tap the AI Advisor to get real-time help on any step.</p>
</div>

<div class="overall-progress">
  <div class="progress-label">
    <span>OVERALL LAUNCH PROGRESS</span>
    <span id="progressText">0%</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>

<div class="layout" id="mainLayout">
  <div class="sections-grid" id="sectionsGrid"></div>
  <div class="chat-panel" id="chatPanel">
    <div class="chat-header">
      <div class="chat-dot"></div>
      <div class="chat-header-text">
        <h3>V1PER AI ADVISOR</h3>
        <p>Powered by Claude — ask me anything</p>
      </div>
      <button class="chat-close" onclick="toggleChat()">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="chatInput" placeholder="Ask about your brand, a task, next steps..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
const sections = [
  {
    id: 's1',
    title: 'BRAND IDENTITY',
    tag: 'FOUNDATION',
    tasks: [
      {
        title: 'Define Your Brand Vision & Mission',
        desc: 'Write a 1–2 sentence mission statement that captures what V1PER stands for. Think about what feeling you want customers to have when they wear your clothes. Ask yourself: what problem does V1PER solve? What lifestyle does it represent? Write it down, refine it, and use it as a filter for every decision.',
        tag: 'STRATEGY'
      },
      {
        title: 'Lock In Your Target Audience',
        desc: 'Create a detailed profile of your ideal customer — age, interests, income, where they shop, who they follow on social media. The more specific the better. V1PER should feel like it was made for exactly one type of person. Name that person, picture them, and design everything with them in mind.',
        tag: 'STRATEGY'
      },
      {
        title: 'Finalize Logo & Wordmark',
        desc: 'You need both a primary logo (icon + wordmark) and a standalone icon version for small placements. Use a tool like Adobe Illustrator or hire a designer on Fiverr/99designs. Export in SVG (for web), PNG transparent (for print mockups), and EPS (for manufacturers). Make sure it scales from a hat embroidery to a billboard.',
        tag: 'DESIGN'
      },
      {
        title: 'Build Your Brand Color Palette',
        desc: 'Choose 2–3 primary colors and 1–2 accent colors. Define exact HEX, RGB, and Pantone codes for consistency across digital and physical. Consider how colors look on garments — sublimation printing vs screen printing affects color output. Document your palette in a brand kit PDF you can share with manufacturers and designers.',
        tag: 'DESIGN'
      },
      {
        title: 'Choose Brand Typography',
        desc: 'Select 1–2 fonts that represent V1PER\'s personality — one for headlines, one for body text. Use Google Fonts or license from fonts.adobe.com. Document pairings, sizes, and usage rules. Consistency in type builds brand recognition faster than most people realize.',
        tag: 'DESIGN'
      },
      {
        title: 'Create a Brand Style Guide',
        desc: 'Compile everything — logo usage, colors, fonts, tone of voice, photography style, and usage don\'ts — into a single PDF or Notion doc. This document becomes the bible for anyone creating V1PER content, including yourself in 6 months when details get fuzzy.',
        tag: 'DESIGN'
      }
    ]
  },
  {
    id: 's2',
    title: 'PRODUCT LINE',
    tag: 'CATALOG',
    tasks: [
      {
        title: 'Decide on Your First Drop / Collection',
        desc: 'Start focused — pick 3 to 6 products for your first collection rather than going wide. A tight, cohesive drop tells a story and is easier to manage. Decide on your hero piece (the one product that defines the drop) and build the collection around it. Name the collection — naming creates hype.',
        tag: 'PRODUCT'
      },
      {
        title: 'Source a Print-on-Demand or Manufacturer',
        desc: 'For POD: Printify, Printful, or SPOD integrate with Shopify and let you start with zero inventory. For private label: Alibaba, ApparelFinder, or local cut-and-sew operations give you more control over quality and branding. Get 3+ quotes, request samples before committing, and check turnaround times. Minimum order quantities (MOQs) on Alibaba can be negotiated.',
        tag: 'PRODUCTION'
      },
      {
        title: 'Order & Approve Physical Samples',
        desc: 'Never go to full production without a sample in your hands. Check stitching quality, fabric feel, color accuracy, print placement, and sizing. Wear it, wash it, photograph it. If anything is off, address it before production. Document any change requests with photos and measurements in writing.',
        tag: 'PRODUCTION'
      },
      {
        title: 'Set Pricing Strategy',
        desc: 'Calculate your cost of goods (COG) including production, shipping, packaging, and any platform fees. Typical streetwear markup is 3–5x COG. Research competitor pricing — where does V1PER sit? Premium above competitors, mid-tier, or accessible? Price communicates value, so be intentional. Build a simple spreadsheet: COG → markup → retail price → profit margin.',
        tag: 'BUSINESS'
      },
      {
        title: 'Design Product Tags & Packaging',
        desc: 'Branded hang tags, inside neck labels, poly mailer bags, tissue paper, and sticker seals all contribute to the unboxing experience. This is what gets posted on TikTok and Instagram. Source custom poly mailers from StickerMule or Alibaba. Even a simple custom sticker on plain packaging elevates the experience massively.',
        tag: 'BRANDING'
      }
    ]
  },
  {
    id: 's3',
    title: 'ONLINE STORE',
    tag: 'E-COMMERCE',
    tasks: [
      {
        title: 'Set Up Shopify Store',
        desc: 'Start a Shopify trial at shopify.com. Choose a theme that aligns with your aesthetic — Dawn, Sense, or Crave work well for fashion brands. You\'ll customize it extensively but start with the closest base. Enable required sales channels: Online Store, and later TikTok Shop and Instagram Shopping.',
        tag: 'TECH'
      },
      {
        title: 'Connect Custom Domain',
        desc: 'Purchase your domain from Namecheap or Google Domains (typically $10–15/year). Inside Shopify: Settings → Domains → Connect existing domain. Update your DNS A records and CNAME to point to Shopify\'s servers. SSL is automatic. v1perclothing.com, shopv1per.com, or similar — pick something clean and easy to type.',
        tag: 'TECH'
      },
      {
        title: 'Write Product Descriptions',
        desc: 'Every product needs a title, 2–3 paragraph description, and sizing information. Lead with benefits and feeling, not just features. Describe the fabric, fit, and who it\'s for. Use keywords people search for ("oversized streetwear hoodie") naturally in the text. Add a size guide table. Great copy converts browsers into buyers.',
        tag: 'CONTENT'
      },
      {
        title: 'Photograph / Mockup Products Professionally',
        desc: 'Use a combination of flat lay, on-model, and lifestyle photography. If shooting yourself, use daylight from a window, a clean background, and shoot in RAW if possible. Alternatively, use Printful\'s mockup generator or Placeit.net for high-quality digital mockups. Aim for 4–6 photos per product showing different angles.',
        tag: 'CONTENT'
      },
      {
        title: 'Configure Payments, Shipping & Tax',
        desc: 'Enable Shopify Payments (or Stripe as backup) and PayPal. Set up shipping zones: domestic rates, international rates, and consider offering free shipping over a threshold (great for AOV). In Shopify: Settings → Taxes → enable automatic tax calculation for your region. If selling internationally, research VAT/customs obligations.',
        tag: 'TECH'
      },
      {
        title: 'Create Key Store Pages',

let chatOpen = false;
let messages = [];
let isLoading = false;

function renderSections() {
  const grid = document.getElementById('sectionsGrid');
  grid.innerHTML = '';

  sections.forEach((section, si) => {
    const totalTasks = section.tasks.length;
    const completedTasks = section.tasks.filter(t => getTaskState(section.id, t.title)).length;
    const allDone = completedTasks === totalTasks;

    const card = document.createElement('div');
    card.className = `section-card${allDone ? ' completed' : ''}`;
    card.dataset.id = section.id;

    card.innerHTML = `
      <div class="section-header" onclick="toggleSection('${section.id}')">
        <span class="section-num">${String(si+1).padStart(2,'0')}</span>
        <span class="section-title">${section.title}</span>
        <span class="section-meta"><span class="${completedTasks === totalTasks ? 'done' : ''}">${completedTasks}</span>/${totalTasks} TASKS &nbsp;·&nbsp; ${section.tag}</span>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </div>
      <div class="tasks-container">
        ${section.tasks.map((task, ti) => {
          const done = getTaskState(section.id, task.title);
          return `
            <div class="task-item${done ? ' done' : ''}" id="task-${section.id}-${ti}">
              <div class="task-checkbox-area">
                <input type="checkbox" class="task-cb" ${done ? 'checked' : ''} onchange="toggleTask('${section.id}', ${ti}, this)">
              </div>
              <div class="task-content">
                <div class="task-title">${task.title}</div>
                <div class="task-desc">${task.desc}</div>
                <div class="task-tag">${task.tag}</div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
    grid.appendChild(card);
  });

  updateProgress();
}

function toggleSection(id) {
  const card = document.querySelector(`.section-card[data-id="${id}"]`);
  const isExpanded = card.classList.contains('expanded');
  document.querySelectorAll('.section-card.expanded').forEach(c => c.classList.remove('expanded'));
  if (!isExpanded) card.classList.add('expanded');
}

function getTaskState(sectionId, taskTitle) {
  const key = `v1per_${sectionId}_${taskTitle}`;
  return localStorage.getItem(key) === 'done';
}

function toggleTask(sectionId, taskIndex, checkbox) {
  const section = sections.find(s => s.id === sectionId);
  const task = section.tasks[taskIndex];
  const key = `v1per_${sectionId}_${task.title}`;
  const taskEl = document.getElementById(`task-${sectionId}-${taskIndex}`);

  if (checkbox.checked) {
    localStorage.setItem(key, 'done');
    taskEl.classList.add('done');
  } else {
    localStorage.removeItem(key);
    taskEl.classList.remove('done');
  }

  const card = document.querySelector(`.section-card[data-id="${sectionId}"]`);
  const totalTasks = section.tasks.length;
  const completedTasks = section.tasks.filter(t => getTaskState(sectionId, t.title)).length;
  const allDone = completedTasks === totalTasks;

  if (allDone) card.classList.add('completed');
  else card.classList.remove('completed');

  const metaEl = card.querySelector('.section-meta');
  metaEl.innerHTML = `<span class="${completedTasks === totalTasks ? 'done' : ''}">${completedTasks}</span>/${totalTasks} TASKS &nbsp;·&nbsp; ${section.tag}`;

  updateProgress();
  showSaved();
}

function showSaved() {
  const el = document.getElementById('saveIndicator');
  el.classList.add('show');
  clearTimeout(window._saveTimer);
  window._saveTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

function updateProgress() {
  const total = sections.reduce((acc, s) => acc + s.tasks.length, 0);
  const done = sections.reduce((acc, s) => {
    return acc + s.tasks.filter(t => getTaskState(s.id, t.title)).length;
  }, 0);
  const pct = Math.round((done / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = pct + '%';
  document.getElementById('headerProgress').textContent = pct + '%';
}

function toggleChat() {
  chatOpen = !chatOpen;
  const panel = document.getElementById('chatPanel');
  const layout = document.getElementById('mainLayout');
  panel.classList.toggle('visible', chatOpen);
  layout.classList.toggle('chat-open', chatOpen);

  if (chatOpen && messages.length === 0) {
    addAIMessage("Hey! I'm your V1PER brand advisor, powered by Claude. I know your full launch checklist — ask me anything: how to complete a specific task, what to prioritize, how to market your brand, or anything else on your mind. Let's build V1PER. 🐍");
  }
}

function getProgress() {
  const total = sections.reduce((acc, s) => acc + s.tasks.length, 0);
  const done = sections.reduce((acc, s) => acc + s.tasks.filter(t => getTaskState(s.id, t.title)).length, 0);
  return { done, total, pct: Math.round((done / total) * 100) };
}

function getCompletedSummary() {
  let summary = [];
  sections.forEach(s => {
    const done = s.tasks.filter(t => getTaskState(s.id, t.title)).map(t => t.title);
    const remaining = s.tasks.filter(t => !getTaskState(s.id, t.title)).map(t => t.title);
    if (done.length > 0 || remaining.length > 0) {
      summary.push(`Section: ${s.title} — Completed: [${done.join(', ')}] — Remaining: [${remaining.join(', ')}]`);
    }
  });
  return summary.join('\n');
}

function addAIMessage(text) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<span class="msg-label">V1PER AI</span><div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  messages.push({ role: 'assistant', content: text });
}

function addUserMessage(text) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<span class="msg-label">YOU</span><div class="msg-bubble">${text}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  messages.push({ role: 'user', content: text });
}

function showTyping() {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typingIndicator';
  div.innerHTML = `<span class="msg-label">V1PER AI</span><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  addUserMessage(text);
  input.value = '';
  autoResize(input);
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  const progress = getProgress();
  const summary = getCompletedSummary();

  const systemPrompt = `You are an expert brand advisor and business coach for V1PER, a streetwear/clothing brand being built by the user. You have deep knowledge of fashion brand building, e-commerce, Shopify, social media marketing, manufacturing, and brand strategy.

The user has a structured brand launch checklist with 6 sections: Brand Identity, Product Line, Online Store, Social Media, Launch Plan, and Legal & Business.

Current progress: ${progress.done}/${progress.total} tasks completed (${progress.pct}%).

Task completion status:
${summary}

Your job is to help the user complete their checklist and build V1PER into a successful brand. Give practical, specific, actionable advice. Be direct, encouraging, and knowledgeable. Reference their specific tasks and progress when relevant. Keep responses concise but useful — 2–4 paragraphs max unless they need detailed step-by-step instructions. You can use line breaks for readability but avoid markdown formatting since this is a chat interface.`;

  const conversationMessages = messages.slice(-10).map(m => ({
    role: m.role,
    content: m.content
  }));

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: conversationMessages
      })
    });

    const data = await response.json();
    removeTyping();

    const reply = data.content?.[0]?.text || 'Sorry, I had trouble responding. Try again!';
    addAIMessage(reply);
  } catch (err) {
    removeTyping();
    addAIMessage('Connection issue — please try again in a moment.');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

renderSections();
</script>
</body>
</html>
